name: Linter

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.1.1
      - name: Lint with flake8 (fail on syntax errors / undefined names)
        run: |
          flake8 scripts \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Style warnings (non-blocking)
        run: |
          flake8 scripts \
            --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
