name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run a simple test
      run: |
        python -c "import scripts.3DEyeTracker"
        python -c "import scripts.camera_test"
        python -c "import scripts.EyeTracker_PCCR"
        python -c "import scripts.gl_sphere"
        python -c "import scripts.linux_cam_stream"
